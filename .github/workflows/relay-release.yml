name: Relay Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./relay
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/studytoolbox-relay:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/studytoolbox-relay:latest
          platforms: linux/amd64,linux/arm64
